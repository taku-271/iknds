version: '3.9'

services:
  iknds:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    volumes:
      - $PWD:$PWD
      - aws-cli-volume:/root/.aws
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: $PWD
    tty: true
    command: tail -f /dev/null
    extra_hosts:
      - host.docker.internal:host-gateway

  iknds-db:
    image: mysql:latest
    env_file:
      - ../.env
    volumes:
      - ../docker/mysql:/var/lib/mysql
    ports:
      - 3306:3306
    restart: always
    tty: true

volumes:
  aws-cli-volume:
    external: true
